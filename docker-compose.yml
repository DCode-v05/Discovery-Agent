# One-command run: `docker compose up --build`
# Reads GEMINI_API_KEY and GROQ_API_KEY from your .env file.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./out:/app/out

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: "http://localhost:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend
